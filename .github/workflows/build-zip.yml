name: Build release zip

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install

      - name: Generate autoloader
        run: composer dump-autoload -oa --no-dev

      - name: Run PHPStan analyse
        run: vendor/bin/phpstan analyse

      - name: PHP Compatibility check
        run: vendor/bin/phpcs -p src --standard=PHPCompatibilityWP

      - name: Run WordPress Coding Standard fixes
        run: vendor/bin/phpcbf --standard=ruleset.xml .

      - uses: anchore/sbom-action@v0

      - name: Run PCP check
        uses: wordpress/plugin-check-action@v1
        with:
          ignore-codes:
            WordPress.NamingConventions.PrefixAllGlobals.NonPrefixedConstantFound
          include-experimental: false
          error-severity: 7
          warning-severity: 6
          include-low-severity-errors: true
        continue-on-error: true

      - name: ZIP plugin
        run: |
          cd ..
          zip -r -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/* -x "*/.git/*" "*/.github/*" "*/changelog.md" "*/phpstan.neon" "*/ruleset.xml" "*/composer.lock" "*/readme.md" "*/.gitignore" "*/vendor/*" "*/composer.sh" "*/dev-composer.json"
          zip -u -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/vendor/composer/*
          zip -u -q ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/vendor/threadi/crypt-for-wordpress/src/*
          cp ${{ github.event.repository.name }}.zip ${{ github.event.repository.name }}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ github.event.repository.name }}.zip